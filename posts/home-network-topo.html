<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>曾经沧海难为水之家中网络拓扑图 - 秋暑恍惚间随笔</title>
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* 网络拓扑图样式 */
        .network-topo {
            background: #f8f5f0;
            border-radius: 12px;
            padding: 24px;
            margin: 24px 0;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .topo-title {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #5d4037;
            margin-bottom: 20px;
        }
        .topo-layer {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 12px 0;
            position: relative;
        }
        .topo-device {
            padding: 10px 16px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            min-width: 140px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .topo-isp { background: #1a5276; color: white; }
        .topo-router { background: #27ae60; color: white; }
        .topo-switch { background: #d35400; color: white; }
        .topo-ap { background: #8e44ad; color: white; }
        .topo-tv { background: #c0392b; color: white; }
        .topo-pc { background: #2980b9; color: white; }
        .topo-line {
            width: 2px;
            height: 24px;
            background: #999;
            margin: 0 auto;
        }
        .topo-line-h {
            height: 2px;
            background: #999;
            flex: 1;
            max-width: 60px;
        }
        .topo-branch {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 8px 0;
        }
        .topo-label {
            font-size: 0.75rem;
            color: #666;
            text-align: center;
            margin: 4px 0;
        }
        .topo-endpoints {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .topo-endpoints .topo-device {
            min-width: 120px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">秋暑恍惚间随笔</h1>
            <p class="site-subtitle">半醉半醒日复日，花开花落年复年</p>
            <nav class="site-nav">
                <a href="../index.html" class="nav-link">首页</a>

            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <article class="post-page">
                <header class="post-header">
                    <h1 class="post-title">曾经沧海难为水之家中网络拓扑图</h1>
                    <div class="post-meta">2023年12月23日 · 技术</div>
                </header>
                <div class="post-content">
                    <p>这是我退休前给家里折腾的一套网络拓扑，当时画了个图留档，今天翻出来看看，还挺有成就感的。</p>

                                        <div style="text-align:center;margin:24px 0;">
                        <img src="../images/topo-original.png" alt="秋暑君家中网络拓扑图" style="max-width:100%;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);">
                        <p style="font-size:0.85rem;color:#7a6b5d;margin-top:8px;">曾经沧海难为水之家中网络拓扑图 - 2023年12月23日</p>
                    </div>
                </div>
            </article>
        </div>
