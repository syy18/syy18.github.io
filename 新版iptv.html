<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 电视墙 - 秋暑的小馆</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/dashjs@latest"></script>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f0eb; color:#333; min-height:100vh;
}
.nav-bar {
  background:#fff; border-bottom:1px solid #e0d6cb;
  padding:12px 20px; display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:100;
}
.nav-bar a {
  color:#8b7355; text-decoration:none; font-size:14px; font-weight:500;
  padding:4px 12px; border-radius:6px; transition:all .2s;
}
.nav-bar a:hover {background:#f0ebe4;}
.nav-bar a.active {background:#8b7355; color:#fff;}
.nav-title {font-size:18px; font-weight:700; color:#5a4a3a; margin-right:auto;}
.player-wrapper {
  position:relative; width:100%; background:#000;
}
#video-container {
  width:100%; max-width:960px; margin:0 auto; position:relative;
  background:#000; aspect-ratio:16/9;
}
#video-container video {width:100%; height:100%; display:block;}
.player-controls {
  display:flex; align-items:center; justify-content:center; gap:12px;
  padding:10px; background:#1a1a1a; flex-wrap:wrap;
}
.player-controls button {
  background:rgba(255,255,255,0.12); color:#fff; border:none;
  padding:8px 18px; border-radius:6px; cursor:pointer; font-size:14px;
  transition:all .2s;
}
.player-controls button:hover {background:rgba(255,255,255,0.25);}
.player-controls .channel-info {color:#aaa; font-size:13px;}
.player-controls .channel-name {color:#fff; font-size:14px; min-width:120px; text-align:center;}
.toolbar {
  display:flex; flex-wrap:wrap; align-items:center; gap:10px;
  padding:14px 20px; background:#fff; border-bottom:1px solid #e0d6cb;
}
.toolbar .count-badge {
  background:#8b7355; color:#fff; font-size:12px;
  padding:3px 10px; border-radius:12px; margin-left:4px;
}
.search-box {
  flex:1; min-width:180px; max-width:320px;
  padding:8px 14px; border:1px solid #d0c4b6; border-radius:20px;
  font-size:14px; outline:none; background:#faf8f5;
}
.search-box:focus {border-color:#8b7355;}
.categories {
  display:flex; flex-wrap:wrap; gap:6px; padding:12px 20px;
  border-bottom:1px solid #e0d6cb;
}
.cat-btn {
  padding:6px 16px; border-radius:16px; border:1px solid #d0c4b6;
  background:#fff; color:#8b7355; cursor:pointer; font-size:13px;
  transition:all .2s;
}
.cat-btn:hover {background:#f0ebe4;}
.cat-btn.active {background:#8b7355; color:#fff; border-color:#8b7355;}
.channel-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px; padding:20px; max-width:1200px; margin:0 auto;
}
.channel-card {
  background:#fff; border-radius:10px; overflow:hidden; cursor:pointer;
  border:1px solid #e8e0d6; transition:all .25s;
}
.channel-card:hover {transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,0.08);}
.channel-card.active {border-color:#8b7355; box-shadow:0 0 0 2px #8b7355;}
.channel-thumb {
  width:100%; aspect-ratio:16/9; background:#f0ebe4;
  display:flex; align-items:center; justify-content:center;
  font-size:36px; color:#c4b6a6; position:relative;
}
.channel-thumb img {width:100%; height:100%; object-fit:cover;}
.channel-info-block {padding:10px 12px;}
.channel-name {font-size:14px; font-weight:600; color:#5a4a3a; margin-bottom:2px; white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.channel-group {font-size:11px; color:#b0a090;}
.fav-btn {
  position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.5);
  color:#fff; border:none; border-radius:50%; width:26px; height:26px;
  font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .2s; z-index:2;
}
.fav-btn:hover {background:rgba(0,0,0,0.75);}
.fav-btn.active {color:#ffd700;}
.loading {text-align:center; padding:60px 20px; color:#b0a090; font-size:15px;}
.loading .spinner {display:inline-block; width:32px; height:32px; border:3px solid #e0d6cb; border-top-color:#8b7355; border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px;}
@keyframes spin {to{transform:rotate(360deg)}}
.empty-state {text-align:center; padding:60px 20px; color:#b0a090;}
.empty-state .icon {font-size:48px; margin-bottom:12px;}
.welcome-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center;
  z-index:9999;
}
.welcome-card {
  background:#fff; border-radius:16px; padding:32px; max-width:420px; width:90%;
  text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.2);
}
.welcome-card h2 {color:#5a4a3a; margin-bottom:10px;}
.welcome-card p {color:#8b7355; font-size:14px; line-height:1.7; margin-bottom:8px;}
.welcome-card .btn {
  display:inline-block; margin-top:16px; padding:10px 32px; background:#8b7355;
  color:#fff; border:none; border-radius:24px; font-size:15px; cursor:pointer;
}
.welcome-card .btn:hover {background:#7a6347;}
@media (max-width:600px) {
  .channel-grid {grid-template-columns:repeat(2,1fr); gap:8px; padding:12px;}
  .toolbar {padding:10px 14px;}
  .search-box {min-width:140px;}
  .nav-bar {padding:10px 14px; gap:10px; flex-wrap:wrap;}
}
</style>
</head>
<body>

<div class="nav-bar">
  <span class="nav-title">秋暑的小馆</span>
  <a href="https://syy18.github.io/">首页</a>
  <a href="https://syy18.github.io/iptv.html" class="active">📺 电视墙</a>
  <a href="https://syy18.github.io/news.html">📰 新闻</a>
</div>

<div class="player-wrapper">
  <div id="video-container"><video id="video-player" controls autoplay playsinline></video></div>
  <div class="player-controls">
    <button onclick="switchChannel(-1)" title="上一频道 (←)">◀ 上一频道</button>
    <span class="channel-name" id="current-channel-name">未选择频道</span>
    <span class="channel-info" id="channel-position"></span>
    <button onclick="switchChannel(1)" title="下一频道 (→)">下一频道 ▶</button>
  </div>
</div>

<div class="toolbar">
  <div style="display:flex;align-items:center;gap:4px;">
    <span style="font-size:14px;color:#5a4a3a;">全部</span>
    <span class="count-badge" id="total-count">0</span>
  </div>
  <input class="search-box" id="search-input" placeholder="🔍 搜索频道名称或分组..." oninput="doSearch()">
</div>

<div class="categories" id="categories">
  <button class="cat-btn active" data-cat="all" onclick="switchCategory('all')">全部</button>
  <button class="cat-btn" data-cat="国内" onclick="switchCategory('国内')">🇨🇳 国内</button>
  <button class="cat-btn" data-cat="国际" onclick="switchCategory('国际')">🌍 国际</button>
  <button class="cat-btn" data-cat="新闻" onclick="switchCategory('新闻')">📰 新闻</button>
  <button class="cat-btn" data-cat="上海" onclick="switchCategory('上海')">🏙️ 上海</button>
  <button class="cat-btn" data-cat="fav" onclick="switchCategory('fav')">⭐ 收藏</button>
</div>

<div id="channel-grid" class="channel-grid"></div>

<script>
// ===== 配置 =====
const DEFAULT_SOURCES_URL = 'https://syy18.github.io/iptv-sources.json';
const STORAGE_KEY = 'iptv_sources_v1';
const FAV_KEY = 'iptv_favs_v1';
const WELCOME_KEY = 'iptv_welcomed_v1';

// ===== 全局状态 =====
let allChannels = [];
let filteredChannels = [];
let currentCategory = 'all';
let currentChannel = null;
let hlsInstance = null;
let dashInstance = null;

// ===== 欢迎弹窗 =====
(function() {
  if (!localStorage.getItem(WELCOME_KEY)) {
    const div = document.createElement('div');
    div.className = 'welcome-overlay';
    div.id = 'welcome-overlay';
    div.innerHTML = `
      <div class="welcome-card">
        <h2>📺 欢迎来到电视墙</h2>
        <p>🎯 点击频道卡片即可播放</p>
        <p>◀ → 方向键切换频道</p>
        <p>⭐ 收藏你喜欢的频道</p>
        <p>🔍 搜索频道名称或分组</p>
        <p style="margin-top:12px;color:#b0a090;font-size:12px;">频道数据从云端自动同步，所有设备共享</p>
        <button class="btn" onclick="dismissWelcome()">开始看电视</button>
      </div>`;
    document.body.appendChild(div);
  }
})();
function dismissWelcome() {
  const el = document.getElementById('welcome-overlay');
  if (el) el.remove();
  localStorage.setItem(WELCOME_KEY, '1');
}

// ===== 键盘事件 =====
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') switchChannel(-1);
  else if (e.key === 'ArrowRight') switchChannel(1);
});

// ===== 初始化 =====
(async function init() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    let localSources = [];
    if (stored) {
      try { localSources = JSON.parse(stored); } catch(e) {}
    }
    let defaultSources = [];
    try {
      const resp = await fetch(DEFAULT_SOURCES_URL);
      if (resp.ok) defaultSources = await resp.json();
    } catch(e) { console.warn('加载默认源失败:', e); }

    let sources = localSources;
    if (sources.length === 0 && defaultSources.length > 0) {
      sources = defaultSources;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sources));
    }
    if (sources.length === 0) {
      sources = [{id:'demo',name:'演示源',url:'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'}];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sources));
    }

    for (const src of sources) {
      try {
        const channels = await parseM3U(src.url, src.name);
        allChannels = allChannels.concat(channels);
      } catch(e) { console.warn('解析源失败:', src.name, e); }
    }

    applyFilterAndRender();
  } catch(e) {
    console.error('初始化失败:', e);
    document.getElementById('channel-grid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>加载频道失败，请刷新重试</div>';
  }
})();

// ===== 解析 M3U =====
async function parseM3U(url, sourceName) {
  const resp = await fetch(url);
  const text = await resp.text();
  const channels = [];
  const lines = text.split('\n');
  let extinf = null;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF:')) {
      extinf = parseExtinf(line);
    } else if (line && !line.startsWith('#') && extinf) {
      channels.push({
        name: extinf.name || '未知频道',
        url: line,
        logo: extinf.logo || '',
        group: extinf.group || '其他',
        source: sourceName || ''
      });
      extinf = null;
    }
  }
  return channels;
}

function parseExtinf(line) {
  const result = {name:'未知频道',logo:'',group:'其他'};
  const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
  if (logoMatch) result.logo = logoMatch[1];
  const groupMatch = line.match(/group-title="([^"]*)"/i);
  if (groupMatch) result.group = groupMatch[1];
  const nameMatch = line.match(/,([^,]+)$/);
  if (nameMatch) result.name = nameMatch[1].trim();
  return result;
}

// ===== 判断分类 =====
function getCategory(ch) {
  const g = (ch.group || '').toLowerCase();
  const n = (ch.name || '').toLowerCase();
  if (g.includes('上海') || g.includes('shanghai') || n.includes('上海') ||
      g.includes('东方') || g.includes('五星体育') || g.includes('上海教育') ||
      g.includes('上海新闻') || g.includes('上海都市') || g.includes('上海娱乐') ||
      g.includes('上海电视剧') || g.includes('上海外语') || g.includes('上海纪实')) {
    return '上海';
  }
  if (g.includes('新闻') || g.includes('news') || n.includes('新闻') ||
      (g.includes('cctv') && (g.includes('新闻') || g.includes('news'))) ||
      n.includes('凤凰') || n.includes('ntd') || n.includes('新唐人')) {
    return '新闻';
  }
  if (g.includes('国际') || g.includes('境外') || g.includes('global') ||
      g.includes('international') || g.includes('外语') || g.includes('外台') ||
      g.includes('bbc') || g.includes('cnn') || g.includes('al jazeera') ||
      g.includes('nhk') || g.includes('star ') || g.includes('卫视') ||
      n.includes('bbc') || n.includes('cnn')) {
    return '国际';
  }
  if (g.includes('国内') || g.includes('cctv') || g.includes('央视') ||
      g.includes('卫视') || g.includes('中央') || g.includes('中国') ||
      g.includes('各省') || g.includes('地方') || g.includes('内地') ||
      n.includes('cctv') || n.includes('央视')) {
    return '国内';
  }
  return '国际';
}

// ===== 核心过滤 + 渲染 =====
function applyFilterAndRender() {
  const query = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const favs = getFavs();
  let list = allChannels;

  if (currentCategory === 'fav') {
    list = list.filter(ch => favs.includes(ch.name));
  } else if (currentCategory !== 'all') {
    list = list.filter(ch => getCategory(ch) === currentCategory);
  }

  if (query) {
    list = list.filter(ch =>
      (ch.name || '').toLowerCase().includes(query) ||
      (ch.group || '').toLowerCase().includes(query)
    );
  }

  const seen = new Set();
  list = list.filter(ch => {
    const key = ch.name + '|' + ch.url;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  filteredChannels = list;
  renderChannelGrid();
}

function renderChannelGrid() {
  const grid = document.getElementById('channel-grid');
  const list = filteredChannels;

  document.getElementById('total-count').textContent = list.length;

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📺</div>没有找到频道</div>';
    return;
  }

  const favs = getFavs();
  grid.innerHTML = list.map((ch, idx) => {
    const isActive = currentChannel && currentChannel.name === ch.name && currentChannel.url === ch.url;
    const isFav = favs.includes(ch.name);
    const logoHtml = ch.logo ? `<img src="${ch.logo}" alt="" onerror="this.style.display='none'">` : '';
    return `
      <div class="channel-card ${isActive ? 'active' : ''}" onclick="playChannelByIndex(${idx})">
        <div class="channel-thumb">
          ${logoHtml}
          <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav('${ch.name.replace(/'/g,"\\'")}')">${isFav ? '★' : '☆'}</button>
        </div>
        <div class="channel-info-block">
          <div class="channel-name">${ch.name}</div>
          <div class="channel-group">${ch.group}</div>
        </div>
      </div>`;
  }).join('');
}

function doSearch() {
  applyFilterAndRender();
  updatePosition();
}

function switchCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  applyFilterAndRender();
  updatePosition();
}

function playChannel(ch) {
  if (!ch) return;
  currentChannel = ch;

  if (hlsInstance) { try { hlsInstance.destroy(); } catch(e){} hlsInstance = null; }
  if (dashInstance) { try { dashInstance.reset(); } catch(e){} dashInstance = null; }

  const video = document.getElementById('video-player');
  document.getElementById('current-channel-name').textContent = ch.name;

  const url = ch.url;
  if (!url || url === '') {
    video.src = '';
    return;
  }

  if (url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(()=>{});
      });
      hlsInstance.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          console.warn('HLS致命错误，尝试直接播放:', url);
          hlsInstance.destroy();
          hlsInstance = null;
          video.src = url;
          video.play().catch(()=>{});
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play().catch(()=>{});
    } else {
      alert('当前浏览器不支持 HLS 播放');
    }
  } else if (url.includes('.mpd')) {
    try {
      dashInstance = dashjs.MediaPlayer().create();
      dashInstance.initialize(video, url, true);
    } catch(e) {
      console.warn('DASH播放失败:', e);
    }
  } else {
    video.src = url;
    video.play().catch(()=>{});
  }

  updatePosition();
  renderChannelGrid();
}

function playChannelByIndex(idx) {
  const ch = filteredChannels[idx];
  if (ch) playChannel(ch);
}

function switchChannel(dir) {
  if (filteredChannels.length === 0) return;
  if (!currentChannel) {
    playChannel(filteredChannels[0]);
    return;
  }
  let idx = filteredChannels.findIndex(ch => ch.name === currentChannel.name && ch.url === currentChannel.url);
  if (idx === -1) idx = filteredChannels.findIndex(ch => ch.name === currentChannel.name);
  if (idx === -1) idx = 0;

  let newIdx = idx + dir;
  if (newIdx < 0) newIdx = filteredChannels.length - 1;
  if (newIdx >= filteredChannels.length) newIdx = 0;
  playChannel(filteredChannels[newIdx]);
}

function updatePosition() {
  const el = document.getElementById('channel-position');
  if (!currentChannel || filteredChannels.length === 0) {
    el.textContent = '';
    return;
  }
  let idx = filteredChannels.findIndex(ch => ch.name === currentChannel.name && ch.url === currentChannel.url);
  if (idx === -1) idx = filteredChannels.findIndex(ch => ch.name === currentChannel.name);
  if (idx === -1) idx = 0;
  el.textContent = `${idx+1} / ${filteredChannels.length}`;
}

function getFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch(e) { return []; }
}
function saveFavs(favs) { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }
function toggleFav(name) {
  let favs = getFavs();
  const idx = favs.indexOf(name);
  if (idx > -1) favs.splice(idx, 1);
  else favs.push(name);
  saveFavs(favs);
  if (currentCategory === 'fav') applyFilterAndRender();
  else renderChannelGrid();
}
</script>
</body>
</html>
