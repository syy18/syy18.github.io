<!DOCTYPE html>



<html lang="zh-CN">



<head>



    <meta charset="UTF-8">



    <meta name="viewport" content="width=device-width, initial-scale=1.0">



    <title>IPTV - 秋暑恍惚间随笔</title>



    <link rel="stylesheet" href="css/style.css">



    <link rel="preconnect" href="https://fonts.googleapis.com">



    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">



    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.11/dist/hls.min.js"></script>



    <script src="https://cdn.jsdelivr.net/npm/dashjs@4.7.4/dist/dash.all.min.js"></script>



    <style>



      /* IPTV 专用补充样式，与博客浅色卡片风格统一 */



      .iptv-wrap { font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; position: relative; z-index: 1; }



      .iptv-toolbar {



        display: flex; flex-wrap: wrap; align-items: center; gap: 12px;



        margin-bottom: 22px; position: relative; z-index: 100;



      }



      .iptv-search {



        position: relative; flex: 1 1 220px; min-width: 180px;



      }



      .iptv-search input {



        width: 100%; padding: 10px 12px 10px 36px;



        border: 1px solid rgba(0,0,0,0.08); border-radius: 10px;



        background: #fff; font-size: 14px; color: #333;



        box-shadow: 0 2px 8px rgba(0,0,0,0.04);



      }



      .iptv-search input:focus { outline: none; border-color: #3498db; }



      .iptv-search svg {



        position: absolute; left: 11px; top: 50%; transform: translateY(-50%);



        width: 16px; height: 16px; color: #999; pointer-events: none;



      }



      .iptv-btn {



        display: inline-flex; align-items: center; gap: 6px;



        padding: 10px 16px; border-radius: 10px; border: none;



        background: #3498db; color: #fff; font-size: 14px; font-weight: 500;



        cursor: pointer; transition: background .15s; position: relative; z-index: 101;



      }



      .iptv-btn:hover { background: #2980b9; }



      .iptv-btn-ghost {



        background: #fff; color: #555; border: 1px solid rgba(0,0,0,0.08);



        box-shadow: 0 2px 8px rgba(0,0,0,0.04);



      }



      .iptv-btn-ghost:hover { background: #f5f7f9; }







      .iptv-tabs {



        display: flex; gap: 10px; margin-bottom: 20px;



        overflow-x: auto; scrollbar-width: none;



      }



      .iptv-tabs::-webkit-scrollbar { display: none; }



      .iptv-tab {



        flex: 0 0 auto; padding: 8px 18px; border-radius: 999px;



        background: #fff; color: #555; border: 1px solid rgba(0,0,0,0.08);



        font-size: 14px; cursor: pointer; transition: all .15s; white-space: nowrap;



      }



      .iptv-tab:hover { color: #3498db; border-color: rgba(52,152,219,0.3); }



      .iptv-tab.active { background: #3498db; color: #fff; border-color: #3498db; }







      .iptv-grid {



        display: grid;



        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));



        gap: 18px;



      }



      @media (max-width: 640px) {



        .iptv-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }



      }







      .iptv-card {



        background: #fff; border-radius: 14px; overflow: hidden;



        border: 1px solid rgba(0,0,0,0.06);



        box-shadow: 0 4px 14px rgba(0,0,0,0.06);



        cursor: pointer; transition: transform .15s, box-shadow .15s;



        position: relative;



      }



      .iptv-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.1); }



      .iptv-thumb {



        aspect-ratio: 16/10; background: linear-gradient(135deg, #eef2f5 0%, #dfe6e9 100%);



        display: grid; place-items: center; position: relative;



      }



      .iptv-thumb::after {



        content: "▶"; position: absolute; width: 40px; height: 40px; border-radius: 50%;



        background: rgba(0,0,0,0.5); color: #fff; display: grid; place-items: center;



        font-size: 14px; opacity: 0; transition: opacity .15s;



      }



      .iptv-card:hover .iptv-thumb::after { opacity: 1; }



      .iptv-logo {



        width: 56px; height: 56px; object-fit: contain;



        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));



      }



      .iptv-info { padding: 12px 14px; }



      .iptv-name { font-size: 14px; font-weight: 600; color: #2c3e50; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }



      .iptv-group { font-size: 12px; color: #7f8c8d; margin-top: 4px; }



      .iptv-fav {



        position: absolute; top: 8px; right: 8px; width: 26px; height: 26px;



        border-radius: 50%; background: rgba(0,0,0,0.35); color: #fff;



        display: grid; place-items: center; font-size: 14px; opacity: 0; transition: opacity .15s; border: none;



      }



      .iptv-card:hover .iptv-fav { opacity: 1; }



      .iptv-fav.active { color: #f1c40f; opacity: 1; }







      .iptv-empty {



        text-align: center; padding: 60px 20px; color: #7f8c8d;



      }



      .iptv-empty svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: .5; }



      .iptv-empty h3 { margin: 0 0 8px; color: #2c3e50; font-size: 18px; }



      .iptv-empty p { margin: 0 auto 18px; font-size: 14px; line-height: 1.7; max-width: 460px; }







      /* 播放器浮层 */



      .iptv-player {



        position: fixed; inset: 0; background: rgba(0,0,0,0.94);



        z-index: 200; display: none; flex-direction: column;



      }



      .iptv-player.active { display: flex; }



      .iptv-player-header {



        display: flex; align-items: center; justify-content: space-between;



        padding: 14px 18px; background: rgba(11,11,14,0.95);



        border-bottom: 1px solid rgba(255,255,255,0.08);



      }



      .iptv-player-title { color: #fff; }



      .iptv-player-title strong { display: block; font-size: 16px; }



      .iptv-player-title span { font-size: 12px; color: #aaa; }



      .iptv-player-actions { display: flex; gap: 10px; align-items: center; }



      .iptv-quality {



        padding: 7px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);



        background: rgba(255,255,255,0.1); color: #fff; font-size: 13px;



      }



      .iptv-player-body {



        flex: 1; display: grid; place-items: center; padding: 16px; background: #000;



      }



      .iptv-player-body video {



        width: 100%; height: 100%; max-width: 1400px;



        border-radius: 8px; background: #000;



      }



      .iptv-status {



        position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);



        padding: 8px 16px; border-radius: 8px; background: rgba(0,0,0,0.7);



        color: #fff; font-size: 13px; display: none;



      }



      .iptv-status.active { display: block; }







      /* 源管理弹窗 */



      .iptv-modal-backdrop {



        position: fixed; inset: 0; background: rgba(0,0,0,0.6);



        z-index: 190; display: none; place-items: center; padding: 16px;



        backdrop-filter: blur(3px);



      }



      .iptv-modal-backdrop.active { display: grid; }



      .iptv-modal {



        width: 100%; max-width: 560px; max-height: 80vh; overflow: hidden;



        background: #fff; border-radius: 16px;



        box-shadow: 0 20px 50px rgba(0,0,0,0.2); display: flex; flex-direction: column;



      }



      .iptv-modal-header {



        padding: 18px; border-bottom: 1px solid rgba(0,0,0,0.08);



        display: flex; justify-content: space-between; align-items: center;



      }



      .iptv-modal-header h3 { margin: 0; font-size: 17px; color: #2c3e50; }



      .iptv-modal-body { padding: 18px; overflow-y: auto; flex: 1; }



      .iptv-source-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }



      .iptv-source-item {



        display: flex; align-items: center; gap: 10px;



        padding: 10px 12px; background: #f8f9fa; border-radius: 10px;



        border: 1px solid rgba(0,0,0,0.06);



      }



      .iptv-source-item input {



        flex: 1; background: transparent; border: none; color: #2c3e50; font-size: 14px; outline: none;



      }



      .iptv-source-item button {



        background: transparent; color: #e74c3c; font-size: 13px; padding: 4px 8px;



        border-radius: 6px; border: none; cursor: pointer;



      }



      .iptv-source-item button:hover { background: rgba(231,76,60,0.08); }



      .iptv-input-row { display: flex; gap: 10px; }



      .iptv-input-row input {



        flex: 1; padding: 10px 12px; border-radius: 10px;



        background: #f8f9fa; border: 1px solid rgba(0,0,0,0.08);



        color: #2c3e50; font-size: 14px;



      }



      .iptv-input-row input:focus { border-color: #3498db; outline: none; }



      .iptv-hint { font-size: 12px; color: #7f8c8d; line-height: 1.6; margin-top: 14px; }



      .iptv-hint code { background: #f0f3f5; padding: 1px 5px; border-radius: 4px; color: #2980b9; }



    </style>



</head>



<body>



    <header class="site-header">



        <div class="header-inner">



            <h1 class="site-title">秋暑恍惚间随笔</h1>



            <p class="site-subtitle">半醉半醒日复日，花开花落年复年</p>



            <nav class="site-nav">



                <a href="index.html" class="nav-link">首页</a>



                <a href="about.html" class="nav-link">关于</a>



                <a href="iptv.html" class="nav-link active">IPTV</a>



            </nav>



        </div>



    </header>







    <main class="main-content">



        <div class="container iptv-wrap">



            <div class="iptv-toolbar"><span id="chCount" style="font-size:13px;color:#7f8c8d;white-space:nowrap;margin-right:auto;"></span>



                <div class="iptv-search">



                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>



                    <input type="text" id="searchInput" placeholder="搜索频道..." autocomplete="off">



                </div>



                <button class="iptv-btn iptv-btn-ghost" id="sourcesBtn" onclick="openSources()">⚙️ 源管理</button>



            </div>







            <div class="iptv-tabs" id="tabs">



                <button class="iptv-tab active" data-cat="all">全部</button>



                <button class="iptv-tab" data-cat="domestic">国内</button>



                <button class="iptv-tab" data-cat="international">国际</button>



                <button class="iptv-tab" data-cat="news">新闻</button>



                <button class="iptv-tab" data-cat="shanghai">上海</button>



                <button class="iptv-tab" data-cat="fav">收藏</button>



            </div>







            <div class="iptv-empty" id="empty">



                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2l-5 5-5-5"/></svg>



                <h3>暂无频道</h3>



                <p>点击右上角「源管理」添加 M3U / M3U8 播放列表。播放器在浏览器本地解析，不存储任何直播内容。</p>



                <button class="iptv-btn" id="emptyAddBtn">添加播放源</button>



            </div>



            <div class="iptv-grid" id="grid"></div>



        </div>



    </main>







    <footer class="site-footer">



        <p> 秋暑恍惚间 · 与月和兄之缘</p>



    </footer>







    <!-- 播放器 -->



    <div class="iptv-player" id="playerOverlay">



        <div class="iptv-player-header">



            <div class="iptv-player-title">



                <strong id="playerChannelName">频道</strong>



                <span id="playerChannelMeta">正在播放</span>



            </div>



            <div class="iptv-player-actions">



                <select class="iptv-quality" id="qualitySelect" title="清晰度"></select><button class="iptv-btn iptv-btn-ghost" id="prevBtn" style="padding:8px 12px;font-size:16px" title="上一个">&#8592;</button><button class="iptv-btn iptv-btn-ghost" id="nextBtn" style="padding:8px 12px;font-size:16px" title="下一个">&#8594;</button>



                <button class="iptv-btn iptv-btn-ghost" id="closePlayer">✕ 关闭</button>



            </div>



        </div>



        <div class="iptv-player-body" style="position:relative;">



            <video id="video" controls playsinline></video>



            <div class="iptv-status" id="status"></div>



        </div>



    </div>







    <!-- 源管理 -->



    <div class="iptv-modal-backdrop" id="modalBackdrop">



        <div class="iptv-modal">



            <div class="iptv-modal-header">



                <h3>播放源管理</h3>



                <button class="iptv-btn iptv-btn-ghost" id="closeModal">✕</button>



            </div>



            <div class="iptv-modal-body">



                <p class="iptv-hint">支持标准 M3U / M3U8 直播列表。若链接跨域受限，可尝试 CORS 代理前缀，如 <code>https://corsproxy.io/?</code>。</p>



                <div class="iptv-source-list" id="sourceList"></div>



                <div class="iptv-input-row">



                    <input type="text" id="newSourceUrl" placeholder="https://example.com/playlist.m3u">



                    <button class="iptv-btn" id="addSourceBtn">添加</button>



                </div>



                <p class="iptv-hint">提示：部分 MPD/DASH 源需要特定 User-Agent，浏览器环境通常无法绕过；HLS（.m3u8）源兼容性最佳。</p>



            </div>



        </div>



    </div>







    <script>



        const STORAGE_KEY = 'iptv_sources_v1';



        const FAV_KEY = 'iptv_favorites_v1';



        const DEFAULT_SOURCES_URL = 'iptv-sources.json';



        const DEFAULT_SOURCES = [



            { id: 'demo', name: '演示源（Big Buck Bunny）', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' }



        ];



        let sources = [], channels = [], currentCategory = 'all', searchTerm = '';



        let hls = null, dash = null, currentChannel = null, favorites = new Set();



        const $ = id => document.getElementById(id);







        async function loadSources() {



            try {



                const raw = localStorage.getItem(STORAGE_KEY);



                if (raw) {



                    sources = JSON.parse(raw);



                } else {



                    try {



                        const res = await fetch(DEFAULT_SOURCES_URL);



                        if (res.ok) sources = await res.json();



                        else sources = DEFAULT_SOURCES.slice();



                    } catch (e) { sources = DEFAULT_SOURCES.slice(); }



                }



            } catch (e) { sources = DEFAULT_SOURCES.slice(); }



            try { favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]')); } catch (e) { favorites = new Set(); }



        }



        function saveSources() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sources)); }



        function saveFavorites() { localStorage.setItem(FAV_KEY, JSON.stringify([...favorites])); }







        async function fetchText(url) {



            const res = await fetch(url, { method: 'GET' });



            if (!res.ok) throw new Error('HTTP ' + res.status);



            return res.text();



        }



        function parseExtInf(line) {



            const attrs = {};



            const re = /(\w+(?:-[\w]+)*)=["']?([^"']+)["']?/g;



            let m;



            while ((m = re.exec(line)) !== null) attrs[m[1].toLowerCase()] = m[2];



            return attrs;



        }



        function parseM3U(text, sourceId) {



            const lines = text.split(/\r?\n/);



            const out = []; let pending = null;



            for (let raw of lines) {



                const line = raw.trim();



                if (!line || line.startsWith('#EXTM3U')) continue;



                if (line.startsWith('#EXTINF:')) {



                    pending = { sourceId, sourceName: sources.find(s => s.id === sourceId)?.name || sourceId };



                    const commaIdx = line.indexOf(',');



                    if (commaIdx > -1) pending.name = line.slice(commaIdx + 1).trim();



                    const attrs = parseExtInf(line);



                    if (attrs['tvg-name']) pending.tvgName = attrs['tvg-name'];



                    if (attrs['tvg-logo']) pending.logo = attrs['tvg-logo'];



                    if (attrs['group-title']) pending.group = attrs['group-title'];



                } else if (line.startsWith('#EXTGRP:')) {



                    if (pending) pending.group = line.slice(8).trim();



                } else if (!line.startsWith('#')) {



                    if (pending) {



                        pending.url = line;



                        pending.id = sourceId + '|' + (pending.name || out.length);



                        pending.category = categorize(pending);



                        out.push(pending); pending = null;



                    }



                }



            }



            return out;



        }



        function categorize(ch) {



            const g = (ch.group || '').toLowerCase();



            const n = (ch.name || '').toLowerCase();



            const combined = g + ' ' + n;



            if (/上海|shanghai/.test(combined)) return 'shanghai';



            if (/新闻|news|资讯|cnn|bbc|cctv-?13/.test(combined)) return 'news';



            if (/国际|港澳台|香港|澳门|台湾|国外|海外|global|international|hbo|fox|disney|national geographic/.test(combined)) return 'international';



            if (/央视|cctv|卫视|国内|大陆|中国|china|北京|江苏|浙江|东方|湖南|广东/.test(combined)) return 'domestic';



            return 'other';



        }



        async function loadAll() {



            showStatus('正在加载频道...');



            const results = [];



            for (const src of sources) {



                try { results.push(...parseM3U(await fetchText(src.url), src.id)); }



                catch (err) { console.warn('加载源失败', src.url, err); }



            }



            channels = results; hideStatus(); render();



        }



        function filterChannels() {



            let list = channels;



            if (currentCategory === 'fav') list = list.filter(c => favorites.has(c.id));



            else if (currentCategory !== 'all') list = list.filter(c => c.category === currentCategory || (currentCategory === 'domestic' && c.category === 'shanghai'));



            if (searchTerm.trim()) {



                const q = searchTerm.toLowerCase();



                list = list.filter(c => (c.name || '').toLowerCase().includes(q) || (c.group || '').toLowerCase().includes(q));



            }



            return list;



        }



        function escapeHtml(s) {



            return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));



        }



        function render() {



            showCount();



            const list = filterChannels();



            const grid = $('grid'); const empty = $('empty');



            if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }



            empty.style.display = 'none';



            grid.innerHTML = list.map(c => {



                const isFav = favorites.has(c.id);



                const thumb = c.logo



                    ? `<img class="iptv-logo" src="${escapeHtml(c.logo)}" alt="" loading="lazy" onerror="this.style.display='none'">`



                    : `<div style="font-size:28px;opacity:.6">📡</div>`;



                return `



                    <div class="iptv-card" data-id="${escapeHtml(c.id)}" title="${escapeHtml(c.name || '')}">



                        <div class="iptv-thumb" style="${c.logo ? 'color:#333' : 'background:linear-gradient(135deg,#3498db,#2980b9); color:#fff'}">${thumb}</div>



                        <div class="iptv-info">



                            <div class="iptv-name">${escapeHtml(c.name || '未命名')}</div>



                            <div class="iptv-group">${escapeHtml(c.group || c.sourceName || '')}</div>



                        </div>



                        <button class="iptv-fav ${isFav ? 'active' : ''}" data-fav="${escapeHtml(c.id)}" title="收藏">★</button>



                    </div>



                `;



            }).join('');



        }



        function destroyPlayer() {



            if (hls) { hls.destroy(); hls = null; }



            if (dash) { dash.reset(); dash = null; }



            const v = $('video'); v.pause(); v.src = ''; v.load();



            $('qualitySelect').innerHTML = '';



        }



        function detectType(url) {



            if (url.includes('.mpd') || url.endsWith('.mpd')) return 'dash';



            if (url.includes('.m3u8') || url.endsWith('.m3u8') || url.includes('.m3u')) return 'hls';



            return 'native';



        }



        function populateQuality(levels, current) {



            const sel = $('qualitySelect'); sel.innerHTML = '';



            if (!levels.length) { sel.style.display = 'none'; return; }



            sel.style.display = 'inline-block';



            const auto = document.createElement('option'); auto.value = '-1'; auto.text = '自动'; auto.selected = current === -1; sel.appendChild(auto);



            levels.forEach((lvl, i) => {



                const opt = document.createElement('option'); opt.value = String(i);



                const h = lvl.height || 0;



                opt.text = h >= 720 ? `${h}P` : `${Math.round((lvl.bitrate || 0)/1000)} kbps`;



                opt.selected = i === current; sel.appendChild(opt);



            });



            sel.onchange = () => {



                const idx = parseInt(sel.value, 10);



                if (hls) hls.currentLevel = idx; else if (dash) dash.setQualityFor('video', idx);



            };



        }



        function playChannel(channel) {



            currentChannel = channel; destroyPlayer();



            $('playerChannelName').textContent = channel.name || '未命名频道';



            $('playerChannelMeta').textContent = `${channel.group || channel.sourceName || ''} · ${channel.url}`;



            $('playerOverlay').classList.add('active');



            const v = $('video'); const type = detectType(channel.url);



            showStatus('正在连接...');



            if (type === 'hls' && Hls.isSupported()) {



                hls = new Hls({ enableWorker: true, maxBufferLength: 30 });



                hls.loadSource(channel.url); hls.attachMedia(v);



                hls.on(Hls.Events.MANIFEST_PARSED, () => {



                    hideStatus(); v.play().catch(() => {});



                    populateQuality(hls.levels.map(l => ({ height: l.height, bitrate: l.bitrate })), hls.currentLevel);



                });



                hls.on(Hls.Events.LEVEL_SWITCHED, () => { if ($('qualitySelect')) $('qualitySelect').value = String(hls.currentLevel); });



                hls.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) showStatus('播放失败：' + data.type + ' / ' + data.details); });



            } else if (type === 'dash') {



                dash = dashjs.MediaPlayer().create();



                dash.initialize(v, channel.url, true);



                dash.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {



                    hideStatus();



                    const bitrates = dash.getBitrateInfoListFor('video') || [];



                    populateQuality(bitrates.map(b => ({ height: b.height, bitrate: b.bitrate })), dash.getQualityFor('video'));



                });



                dash.on(dashjs.MediaPlayer.events.ERROR, e => showStatus('播放失败：' + (e.error ? e.error.message : 'DASH error')));



            } else {



                v.src = channel.url;



                v.onloadeddata = () => { hideStatus(); v.play().catch(() => {}); };



                v.onerror = () => showStatus('播放失败，请检查链接或跨域设置');



            }



        }



        function showStatus(msg) { const el = $('status'); el.textContent = msg; el.classList.add('active'); }



        function hideStatus() { $('status').classList.remove('active'); }



        function openSources() { renderSourceList(); $('modalBackdrop').classList.add('active'); }



        function closeSources() { $('modalBackdrop').classList.remove('active'); }



        function renderSourceList() {



            const box = $('sourceList');



            if (!sources.length) { box.innerHTML = '<p class="iptv-hint">暂无源，请在下方添加。</p>'; return; }



            box.innerHTML = sources.map(s => `



                <div class="iptv-source-item">



                    <input type="text" value="${escapeHtml(s.url)}" readonly title="${escapeHtml(s.name || s.url)}">



                    <button data-del="${escapeHtml(s.id)}">删除</button>



                </div>



            `).join('');



        }



        function addSource() {



            const input = $('newSourceUrl'); const url = input.value.trim();



            if (!url) return;



            sources.push({ id: 'src_' + Date.now(), name: url.split('/').pop() || '自定义源', url });



            saveSources(); input.value = ''; renderSourceList(); loadAll();



        }



        function removeSource(id) { sources = sources.filter(s => s.id !== id); saveSources(); renderSourceList(); loadAll(); }







        $('tabs').addEventListener('click', e => {



            if (!e.target.classList.contains('iptv-tab')) return;



            document.querySelectorAll('.iptv-tab').forEach(t => t.classList.remove('active'));



            e.target.classList.add('active'); currentCategory = e.target.dataset.cat; render();



        });



        $('searchInput').addEventListener('input', e => { searchTerm = e.target.value; render(); });



        $('grid').addEventListener('click', e => {



            const favBtn = e.target.closest('.iptv-fav');



            if (favBtn) {



                const id = favBtn.dataset.fav;



                if (favorites.has(id)) favorites.delete(id); else favorites.add(id);



                saveFavorites(); render(); return;



            }



            const card = e.target.closest('.iptv-card');



            if (card) { const ch = channels.find(c => c.id === card.dataset.id); if (ch) playChannel(ch); }



        });



        $('closePlayer').addEventListener('click', () => { $('playerOverlay').classList.remove('active'); destroyPlayer(); });



        $('sourcesBtn').addEventListener('click', openSources);



        $('emptyAddBtn').addEventListener('click', openSources);



        $('closeModal').addEventListener('click', closeSources);



        $('modalBackdrop').addEventListener('click', e => { if (e.target === $('modalBackdrop')) closeSources(); });



        $('addSourceBtn').addEventListener('click', addSource);



        $('newSourceUrl').addEventListener('keydown', e => { if (e.key === 'Enter') addSource(); });



        $('sourceList').addEventListener('click', e => { const btn = e.target.closest('button[data-del]'); if (btn) removeSource(btn.dataset.del); });



        document.addEventListener('keydown', e => {



            if (e.key === 'Escape' && $('playerOverlay').classList.contains('active')) {



                $('playerOverlay').classList.remove('active'); destroyPlayer();



            }



        });







        (async () => { await loadSources(); loadAll(); })();



    



        function showWelcome() {



            if (localStorage.getItem("iptv_welcomed_v1")) return;



            var d = document.createElement("div");



            d.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:16px;padding:28px 32px;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);z-index:999;text-align:center;line-height:1.7;";



            d.innerHTML = "<div style=\"font-size:48px;margin-bottom:10px;\">\u2601</div><h3 style=\"margin:0 0 8px;color:#2c3e50;\">\u6b22\u8fce\u4f7f\u7528 IPTV</h3><p style=\"color:#555;font-size:14px;margin:0 0 6px;\">\u70b9\u51fb\u4efb\u610f\u5361\u7247\u5373\u53ef\u64ad\u653e</p><p style=\"color:#999;font-size:12px;margin:0 0 16px;\">\u81ea\u5b9a\u4e49\u6e90\u53ef\u5728\u201c\u6e90\u7ba1\u7406\u201d\u6dfb\u52a0</p><button onclick=\"this.parentElement.remove();localStorage.setItem('iptv_welcomed_v1','1')\" style=\"padding:10px 28px;border-radius:10px;border:none;background:#3498db;color:#fff;font-size:15px;cursor:pointer;\">\u77e5\u9053\u4e86</button>";



            document.body.appendChild(d);



        }



        function showCount() {



            var el = document.getElementById("chCount");



            if (!el) return;



            var list = filterChannels();



            var label = currentCategory === "all" ? "\u5168\u90e8" : (document.querySelector(".iptv-tab.active")?.textContent || "");



            el.textContent = label + " " + list.length + " \u4e2a\u9891\u9053";



        }



        document.getElementById('prevBtn')?.addEventListener('click',function(){switchChannel(-1);});



        document.getElementById('nextBtn')?.addEventListener('click',function(){switchChannel(1);});



                function switchChannel(dir) {
            if (!currentChannel) return;
            var list = filterChannels();
            if (!list.length) return;
            var idx = 0;
            for (var i = 0; i < list.length; i++) {
                if (list[i].name === currentChannel.name) { idx = i; break; }
            }
            var dest = (idx + dir + list.length) % list.length;
            var next = list[dest];
            if (next) playChannel(next);
        }



</script>



</body>
