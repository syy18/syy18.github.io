<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 电视墙 - 秋暑的小馆</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/dashjs@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f0eb;color:#333;min-height:100vh}
.nav-bar{background:#fff;border-bottom:1px solid #e0d6cb;padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.nav-bar a{color:#8b7355;text-decoration:none;font-size:14px;padding:4px 12px;border-radius:6px}
.nav-bar a:hover{background:#f0ebe4}
.nav-bar a.active{background:#8b7355;color:#fff}
.nav-title{font-size:18px;font-weight:700;color:#5a4a3a;margin-right:auto}
.player-wrapper{position:relative;width:100%;background:#000}
#video-container{width:100%;max-width:960px;margin:0 auto;background:#000;aspect-ratio:16/9}
#video-container video{width:100%;height:100%;display:block}
.player-controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px;background:#1a1a1a;flex-wrap:wrap}
.player-controls button{background:rgba(255,255,255,0.12);color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:14px}
.player-controls button:hover{background:rgba(255,255,255,0.25)}
.player-controls .channel-name{color:#fff;font-size:14px;min-width:120px;text-align:center}
.player-controls .channel-info{color:#aaa;font-size:13px}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:14px 20px;background:#fff;border-bottom:1px solid #e0d6cb}
.toolbar .count-badge{background:#8b7355;color:#fff;font-size:12px;padding:3px 10px;border-radius:12px;margin-left:4px}
.search-box{flex:1;min-width:180px;max-width:320px;padding:8px 14px;border:1px solid #d0c4b6;border-radius:20px;font-size:14px;outline:none;background:#faf8f5}
.search-box:focus{border-color:#8b7355}
.categories{display:flex;flex-wrap:wrap;gap:6px;padding:12px 20px;border-bottom:1px solid #e0d6cb}
.cat-btn{padding:6px 16px;border-radius:16px;border:1px solid #d0c4b6;background:#fff;color:#8b7355;cursor:pointer;font-size:13px}
.cat-btn:hover{background:#f0ebe4}
.cat-btn.active{background:#8b7355;color:#fff;border-color:#8b7355}
.channel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:20px;max-width:1200px;margin:0 auto}
.channel-card{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #e8e0d6}
.channel-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.08)}
.channel-card.active{border-color:#8b7355;box-shadow:0 0 0 2px #8b7355}
.channel-thumb{width:100%;aspect-ratio:16/9;background:#f0ebe4;display:flex;align-items:center;justify-content:center;font-size:36px;color:#c4b6a6;position:relative}
.channel-thumb img{width:100%;height:100%;object-fit:cover}
.channel-info-block{padding:10px 12px}
.channel-name{font-size:14px;font-weight:600;color:#5a4a3a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.channel-group{font-size:11px;color:#b0a090}
.fav-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:13px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center}
.fav-btn:hover{background:rgba(0,0,0,0.75)}
.fav-btn.active{color:#ffd700}
.loading{text-align:center;padding:60px 20px;color:#b0a090;font-size:15px}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid #e0d6cb;border-top-color:#8b7355;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:#b0a090}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.welcome-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:9999}
.welcome-card{background:#fff;border-radius:16px;padding:32px;max-width:420px;width:90%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.2)}
.welcome-card h2{color:#5a4a3a;margin-bottom:10px}
.welcome-card p{color:#8b7355;font-size:14px;line-height:1.7;margin-bottom:8px}
.welcome-card .btn{display:inline-block;margin-top:16px;padding:10px 32px;background:#8b7355;color:#fff;border:none;border-radius:24px;font-size:15px;cursor:pointer}
.welcome-card .btn:hover{background:#7a6347}
@media(max-width:600px){.channel-grid{grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}.toolbar{padding:10px 14px}.search-box{min-width:140px}.nav-bar{padding:10px 14px;gap:10px;flex-wrap:wrap}}
</style>
</head>
<body>

<div class="nav-bar">
  <span class="nav-title">秋暑的小馆</span>
  <a href="https://syy18.github.io/">首页</a>
  <a href="https://syy18.github.io/iptv.html" class="active">📺 电视墙</a>
  <a href="https://syy18.github.io/news.html">📰 新闻</a>
</div>

<div class="player-wrapper">
  <div id="video-container"><video id="video-player" controls autoplay playsinline></video></div>
  <div class="player-controls">
    <button onclick="switchChannel(-1)">◀ 上一频道</button>
    <span class="channel-name" id="current-channel-name">未选择频道</span>
    <span class="channel-info" id="channel-position"></span>
    <button onclick="switchChannel(1)">下一频道 ▶</button>
  </div>
</div>

<div class="toolbar">
  <div style="display:flex;align-items:center;gap:4px">
    <span style="font-size:14px;color:#5a4a3a">全部</span>
    <span class="count-badge" id="total-count">0</span>
  </div>
  <input class="search-box" id="search-input" placeholder="🔍 搜索频道名称或分组..." oninput="doSearch()">
</div>

<div class="categories" id="categories">
  <button class="cat-btn active" data-cat="all" onclick="switchCategory('all')">全部</button>
  <button class="cat-btn" data-cat="guonei" onclick="switchCategory('guonei')">🇨🇳 国内</button>
  <button class="cat-btn" data-cat="guoji" onclick="switchCategory('guoji')">🌍 国际</button>
  <button class="cat-btn" data-cat="xinwen" onclick="switchCategory('xinwen')">📰 新闻</button>
  <button class="cat-btn" data-cat="shanghai" onclick="switchCategory('shanghai')">🏙️ 上海</button>
  <button class="cat-btn" data-cat="fav" onclick="switchCategory('fav')">⭐ 收藏</button>
</div>

<div id="channel-grid" class="channel-grid"></div>

<script>
var DEFAULT_SOURCES_URL = 'https://syy18.github.io/iptv-sources.json';
var STORAGE_KEY = 'iptv_sources_v1';
var FAV_KEY = 'iptv_favs_v1';
var WELCOME_KEY = 'iptv_welcomed_v1';
var allChannels = [];
var filteredChannels = [];
var currentCategory = 'all';
var currentChannel = null;
var hlsInstance = null;
var dashInstance = null;

(function() {
  if (!localStorage.getItem(WELCOME_KEY)) {
    var div = document.createElement('div');
    div.className = 'welcome-overlay';
    div.id = 'welcome-overlay';
    div.innerHTML = '<div class="welcome-card"><h2>📺 欢迎来到电视墙</h2><p>🎯 点击频道卡片即可播放</p><p>◀ → 方向键切换频道</p><p>⭐ 收藏你喜欢的频道</p><p>🔍 搜索频道名称或分组</p><p style="margin-top:12px;color:#b0a090;font-size:12px">频道数据从云端自动同步</p><button class="btn" onclick="dismissWelcome()">开始看电视</button></div>';
    document.body.appendChild(div);
  }
})();
function dismissWelcome() {
  var el = document.getElementById('welcome-overlay');
  if (el) el.remove();
  localStorage.setItem(WELCOME_KEY, '1');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') switchChannel(-1);
  else if (e.key === 'ArrowRight') switchChannel(1);
});

(async function init() {
  try {
    var stored = localStorage.getItem(STORAGE_KEY);
    var localSources = [];
    if (stored) { try { localSources = JSON.parse(stored); } catch(e) {} }
    var defaultSources = [];
    try {
      var resp = await fetch(DEFAULT_SOURCES_URL);
      if (resp.ok) defaultSources = await resp.json();
    } catch(e) { console.warn('e:', e); }
    var sources = defaultSources;
    if (sources.length > 0) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sources));
    } else if (localSources.length > 0) {
      sources = localSources;
    }
    if (sources.length === 0) {
      sources = [{id:'demo',name:'Demo',url:'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'}];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sources));
    }
    for (var i = 0; i < sources.length; i++) {
      try {
        var channels = await parseM3U(sources[i].url, sources[i].name);
        allChannels = allChannels.concat(channels);
      } catch(e) { console.warn('parse fail:', sources[i].name); }
    }
    applyFilterAndRender();
  } catch(e) {
    console.error('init fail:', e);
    document.getElementById('channel-grid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>加载频道失败</div>';
  }
})();

async function parseM3U(url, sourceName) {
  var resp = await fetch(url);
  var text = await resp.text();
  var channels = [];
  var lines = text.split('\n');
  var extinf = null;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (line.indexOf('#EXTINF:') === 0) {
      extinf = parseExtinf(line);
    } else if (line && line.indexOf('#') !== 0 && extinf) {
      channels.push({name: extinf.name, url: line, logo: extinf.logo, group: extinf.group, source: sourceName});
      extinf = null;
    }
  }
  return channels;
}

function parseExtinf(line) {
  var result = {name:'未知频道', logo:'', group:'其他'};
  var m = line.match(/tvg-logo="([^"]*)"/i);
  if (m) result.logo = m[1];
  m = line.match(/group-title="([^"]*)"/i);
  if (m) result.group = m[1];
  m = line.match(/,([^,]+)$/);
  if (m) result.name = m[1].trim();
  return result;
}

function getCategory(ch) {
  var g = (ch.group || '').toLowerCase();
  var n = (ch.name || '').toLowerCase();
  if (g.indexOf('上海') >= 0 || g.indexOf('shanghai') >= 0 || n.indexOf('上海') >= 0) return 'shanghai';
  if (g.indexOf('新闻') >= 0 || g.indexOf('news') >= 0 || n.indexOf('新闻') >= 0 || n.indexOf('凤凰') >= 0 || n.indexOf('新唐人') >= 0) return 'xinwen';
  if (g.indexOf('国际') >= 0 || g.indexOf('境外') >= 0 || g.indexOf('bbc') >= 0 || g.indexOf('cnn') >= 0 || n.indexOf('bbc') >= 0 || n.indexOf('cnn') >= 0) return 'guoji';
  if (g.indexOf('cctv') >= 0 || g.indexOf('央视') >= 0 || g.indexOf('卫视') >= 0 || g.indexOf('中央') >= 0 || g.indexOf('国内') >= 0 || n.indexOf('cctv') >= 0 || n.indexOf('央视') >= 0) return 'guonei';
  return 'guoji';
}

function applyFilterAndRender() {
  var query = (document.getElementById('search-input').value || '').trim().toLowerCase();
  var favs = getFavs();
  var list = allChannels.slice();
  if (currentCategory === 'fav') {
    list = list.filter(function(ch) { return favs.indexOf(ch.name) >= 0; });
  } else if (currentCategory !== 'all') {
    list = list.filter(function(ch) { return getCategory(ch) === currentCategory; });
  }
  if (query) {
    list = list.filter(function(ch) { return (ch.name||'').toLowerCase().indexOf(query) >= 0 || (ch.group||'').toLowerCase().indexOf(query) >= 0; });
  }
  var seen = {};
  list = list.filter(function(ch) {
    var key = ch.name + '|' + ch.url;
    if (seen[key]) return false;
    seen[key] = true;
    return true;
  });
  filteredChannels = list;
  renderChannelGrid();
}

function renderChannelGrid() {
  var grid = document.getElementById('channel-grid');
  var list = filteredChannels;
  document.getElementById('total-count').textContent = list.length;
  if (list.length === 0) { grid.innerHTML = '<div class="empty-state"><div class="icon">📺</div>没有找到频道</div>'; return; }
  var favs = getFavs();
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var ch = list[i];
    var isActive = currentChannel && currentChannel.name === ch.name && currentChannel.url === ch.url;
    var isFav = favs.indexOf(ch.name) >= 0;
    var logo = ch.logo ? '<img src="' + ch.logo + '" alt="" onerror="this.style.display=\'none\'">' : '';
    var starBtn = '<button class="fav-btn ' + (isFav ? 'active' : '') + '" onclick="event.stopPropagation();toggleFav(\'' + ch.name.replace(/'/g, "\\'") + '\')">' + (isFav ? '★' : '☆') + '</button>';
    html += '<div class="channel-card' + (isActive ? ' active' : '') + '" onclick="playChannelByIndex(' + i + ')"><div class="channel-thumb">' + logo + starBtn + '</div><div class="channel-info-block"><div class="channel-name">' + ch.name + '</div><div class="channel-group">' + ch.group + '</div></div></div>';
  }
  grid.innerHTML = html;
}

function doSearch() { applyFilterAndRender(); updatePosition(); }

function switchCategory(cat) {
  currentCategory = cat;
  var btns = document.querySelectorAll('.cat-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var btn = document.querySelector('.cat-btn[data-cat="' + cat + '"]');
  if (btn) btn.classList.add('active');
  applyFilterAndRender();
  updatePosition();
}

function playChannel(ch) {
  if (!ch) return;
  currentChannel = ch;
  if (hlsInstance) { try { hlsInstance.destroy(); } catch(e){} hlsInstance = null; }
  if (dashInstance) { try { dashInstance.reset(); } catch(e){} dashInstance = null; }
  var video = document.getElementById('video-player');
  document.getElementById('current-channel-name').textContent = ch.name;
  var url = ch.url;
  if (!url) { video.src = ''; return; }
  if (url.indexOf('.m3u8') >= 0) {
    if (Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() { video.play().catch(function(){}); });
      hlsInstance.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          hlsInstance.destroy(); hlsInstance = null;
          video.src = url; video.play().catch(function(){});
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url; video.play().catch(function(){});
    }
  } else if (url.indexOf('.mpd') >= 0) {
    try { dashInstance = dashjs.MediaPlayer().create(); dashInstance.initialize(video, url, true); } catch(e) { console.warn('dash fail'); }
  } else {
    video.src = url; video.play().catch(function(){});
  }
  updatePosition();
  renderChannelGrid();
}

function playChannelByIndex(idx) {
  var ch = filteredChannels[idx];
  if (ch) playChannel(ch);
}

function switchChannel(dir) {
  if (filteredChannels.length === 0) return;
  if (!currentChannel) { playChannel(filteredChannels[0]); return; }
  var idx = -1;
  for (var i = 0; i < filteredChannels.length; i++) {
    if (filteredChannels[i].name === currentChannel.name && filteredChannels[i].url === currentChannel.url) { idx = i; break; }
  }
  if (idx === -1) {
    for (var i = 0; i < filteredChannels.length; i++) {
      if (filteredChannels[i].name === currentChannel.name) { idx = i; break; }
    }
  }
  if (idx === -1) idx = 0;
  var newIdx = idx + dir;
  if (newIdx < 0) newIdx = filteredChannels.length - 1;
  if (newIdx >= filteredChannels.length) newIdx = 0;
  playChannel(filteredChannels[newIdx]);
}

function updatePosition() {
  var el = document.getElementById('channel-position');
  if (!currentChannel || filteredChannels.length === 0) { el.textContent = ''; return; }
  var idx = -1;
  for (var i = 0; i < filteredChannels.length; i++) {
    if (filteredChannels[i].name === currentChannel.name && filteredChannels[i].url === currentChannel.url) { idx = i; break; }
  }
  if (idx === -1) {
    for (var i = 0; i < filteredChannels.length; i++) {
      if (filteredChannels[i].name === currentChannel.name) { idx = i; break; }
    }
  }
  if (idx === -1) idx = 0;
  el.textContent = (idx+1) + ' / ' + filteredChannels.length;
}

function getFavs() {
  try { var v = JSON.parse(localStorage.getItem(FAV_KEY)); return v || []; } catch(e) { return []; }
}
function saveFavs(v) { localStorage.setItem(FAV_KEY, JSON.stringify(v)); }
function toggleFav(name) {
  var favs = getFavs();
  var idx = favs.indexOf(name);
  if (idx >= 0) favs.splice(idx, 1); else favs.push(name);
  saveFavs(favs);
  if (currentCategory === 'fav') applyFilterAndRender(); else renderChannelGrid();
}
</script>
</body>
</html>
